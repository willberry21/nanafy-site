<style>
  :root {
    --ground: #FBF4EE; --surface: #FFFBF6; --surface-2: #F5E8DE;
    --ink: #2C1D28; --ink-soft: #6A5460; --line: #E7D7CC;
    --plum: #8A3F5C; --turq: #0a786f; --turq-deep: #085d56; --turq-ink: #04302C; --turq-soft: #A9E3DE;
    --shadow: rgba(58, 30, 44, 0.13); --danger: #B23A3A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #1F1620; --surface: #2B1F2C; --surface-2: #362538;
      --ink: #F1E5DC; --ink-soft: #BFA9B2; --line: #3D2E3C;
      --plum: #D68CA7; --turq: #0a786f; --turq-deep: #23a99e; --turq-ink: #eafffb; --turq-soft: #2A5C58;
      --shadow: rgba(0, 0, 0, 0.4); --danger: #F0918C;
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    --serif: "Hoefler Text", "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
    background: var(--ground); color: var(--ink);
    font-family: var(--sans); font-size: 17px; line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 26px 20px 72px; }
  .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 26px; }
  .brand .mark { font-family: var(--serif); font-size: 1.35rem; font-weight: 600; color: var(--ink-soft); letter-spacing: -0.02em; }
  .brand .mark b { color: var(--turq); }
  .topnav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 26px; }
  .topnav .brand { margin-bottom: 0; text-decoration: none; }
  .tn-links { display: flex; gap: 7px; }
  .tn-links a { font-size: 0.85rem; font-weight: 600; color: var(--turq-deep); text-decoration: none; padding: 7px 12px; border: 1px solid var(--turq-soft); border-radius: 999px; white-space: nowrap; }
  .tn-links a:hover { background: var(--turq); color: var(--turq-ink); border-color: var(--turq); }
  @media (max-width: 430px) { .tn-links a { padding: 6px 9px; font-size: 0.78rem; } }

  .spinner { text-align: center; color: var(--ink-soft); padding: 70px 0; }
  .center { text-align: center; }

  /* header */
  .khead { text-align: center; padding: 6px 0 8px; }
  .khead .prep { font-family: var(--sans); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--plum); margin: 0 0 6px; }
  .khead h1 { font-family: var(--serif); font-weight: 600; font-size: clamp(2rem, 6.4vw, 2.8rem); letter-spacing: -0.01em; line-height: 1.08; margin: 0; text-wrap: balance; }
  .khead .count { color: var(--ink-soft); font-size: 0.98rem; margin-top: 10px; }
  .khead .count b { color: var(--turq-deep); font-family: var(--serif); font-size: 1.1rem; }

  /* gather-more bar */
  .gather { background: var(--surface-2); border-radius: 16px; padding: 14px 16px; margin: 22px 0 30px; }
  .gather .g-t { font-size: 0.9rem; color: var(--ink-soft); margin: 0 0 10px; }
  .gather .g-row { display: flex; gap: 8px; }
  .gather .g-link { flex: 1; min-width: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; font-size: 0.85rem; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; }
  .gather .g-copy { flex: none; border: 0; border-radius: 11px; padding: 0 16px; background: var(--turq); color: var(--turq-ink); font: inherit; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
  .gather .g-copy.done { background: var(--surface); color: var(--turq-deep); }

  /* memory cards */
  .mlist { display: grid; gap: 16px; }
  .mcard { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 20px 20px 18px; box-shadow: 0 14px 34px -26px var(--shadow); }
  .mcard .who { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .mcard .who .name { font-weight: 700; color: var(--plum); font-size: 1rem; }
  .mcard .who .when { font-size: 0.8rem; color: var(--ink-soft); flex: none; }
  .mcard .q { font-family: var(--serif); font-style: italic; color: var(--ink-soft); font-size: 0.95rem; margin: 10px 0 10px; line-height: 1.4; }
  .mcard .body { font-family: var(--serif); font-size: 1.12rem; line-height: 1.5; color: var(--ink); white-space: pre-wrap; }
  .mcard .photo { margin-top: 14px; }
  .mcard .photo img { width: 100%; border-radius: 12px; display: block; }

  /* empty */
  .empty { text-align: center; padding: 30px 10px; }
  .empty .em { font-size: 2.6rem; }
  .empty h2 { font-family: var(--serif); font-weight: 600; font-size: 1.5rem; margin: 8px 0 6px; }
  .empty p { color: var(--ink-soft); margin: 0 auto; max-width: 26em; }

  /* code entry */
  .code-form { max-width: 340px; margin: 0 auto; }
  .code-form input { width: 100%; text-align: center; letter-spacing: 6px; font-weight: 700; text-transform: uppercase; font-family: var(--serif); font-size: 16px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface); color: var(--ink); padding: 13px 15px; outline: none; }
  .code-form input:focus { border-color: var(--turq); box-shadow: 0 0 0 3px var(--turq-soft); }
  .btn { width: 100%; margin-top: 14px; border: 0; border-radius: 999px; background: var(--turq); color: var(--turq-ink); font: inherit; font-size: 1.02rem; font-weight: 700; padding: 15px; cursor: pointer; }
  .error { color: var(--danger); font-size: 14px; margin-top: 12px; text-align: center; }

  .refresh { display: block; margin: 26px auto 0; border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 999px; padding: 11px 22px; font: inherit; font-weight: 600; font-size: 0.92rem; cursor: pointer; }
  .foot { margin-top: 34px; text-align: center; font-size: 12.5px; color: var(--ink-soft); }
  .foot a { color: var(--turq-deep); text-decoration: none; }

  /* == New theme: bold & friendly, white canvas (light only) — overrides == */
  :root{
    color-scheme:light;
    --ground:#ffffff; --surface:#ffffff; --surface-2:#f7f2ec;
    --ink:#14201f; --ink-soft:#5a6a68; --line:#ece6dd;
    --plum:#c14e7c; --turq:#0fb0a4; --turq-deep:#0a7a72; --turq-ink:#ffffff; --turq-soft:#bfeae6;
    --shadow:rgba(20,32,31,.14); --danger:#c0392b;
  }
  body{ --serif:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif; }
  h1,h2,.brand .mark,.code-chip b,.key-sub b,#honoree{ font-weight:900; letter-spacing:-.02em; }
  .submit,.copy-btn,.action.primary,.chip[aria-pressed="true"]{ box-shadow:0 10px 24px -10px rgba(15,176,164,.55); }

  /* == web↔app consistency: turquoise labels + turquoise-wash note (match app) == */
  .label{ color:var(--turq-deep); }

  .prof-link{ font-weight:700; color:var(--ink); text-decoration:none; align-self:center; }

  /* ═══ BLACK-ACCENT hero: deep teal field with edge light instead of flat #0f1c1a ═══ */
  .khead{ background:linear-gradient(160deg,#123832 0%,#0a1f1c 55%,#060f0e 100%);

<script>
const SUPABASE_URL = 'https://vigenqlwwoknxjzahvtv.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpZ2VucWx3d29rbnhqemFodnR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NDI0MjksImV4cCI6MjA5OTIxODQyOX0.qjggNEyEwVfrHP8neWPlTPcKOp92wiFwUgv4aEiswaE';
const HEADERS = { apikey: ANON_KEY, Authorization: 'Bearer ' + ANON_KEY };
const PREPOSITIONS = { memorial: 'In memory of', wedding: 'Celebrating', birthday: 'Celebrating', graduation: 'Congratulating', tribute: 'A tribute to', other: 'For' };

const BLOOM_WM = '<svg viewBox="0 0 100 100" aria-hidden="true"><g fill="rgba(255,255,255,.13)"><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(0 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(30 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(60 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(90 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(120 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(150 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(180 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(210 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(240 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(270 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(300 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(330 50 50)"/><circle cx="50" cy="50" r="18.5"/></g></svg>';
const app = document.getElementById('app');
let code = '';

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function when(iso) {
  const d = new Date(iso), now = new Date();
  const mins = Math.round((now - d) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min ago';
  const hrs = Math.round(mins / 60);
  if (hrs < 24 && d.toDateString() === now.toDateString()) return hrs + (hrs === 1 ? ' hour ago' : ' hours ago');
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

async function fetchKeepsake(c) {
  const q = SUPABASE_URL + '/rest/v1/events?share_code=eq.' + encodeURIComponent(c.toUpperCase()) +
    '&select=id,title,honoree,event_type,photo_url,prompts(text,position),memories(contributor_name,prompt_text,body,photo_url,created_at)';
  const res = await fetch(q, { headers: HEADERS });
  if (!res.ok) throw new Error('server');
  return (await res.json())[0] || null;
}

function renderCodeEntry(message) {
  app.innerHTML =
    '<div class="center khead"><h1>Open a keepsake</h1>' +
    '<p class="count">Enter its 6-character code to see the memories gathered.</p></div>' +
    '<form class="code-form" id="codeForm">' +
    '<input type="text" id="codeInput" maxlength="6" autocomplete="off" autocapitalize="characters" placeholder="ABC123" aria-label="Keepsake code">' +
    (message ? '<p class="error">' + esc(message) + '</p>' : '') +
    '<button class="btn" type="submit">Open</button></form>';
  document.getElementById('codeForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const c = document.getElementById('codeInput').value.trim();
    if (c.length === 6) start(c);
  });
}

function render(ev) {
  const prep = PREPOSITIONS[ev.event_type] || 'For';
  const title = ev.honoree || ev.title;
  const memories = (ev.memories || []).slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const n = memories.length;
  const addLink = location.origin + '/add/?c=' + encodeURIComponent(code.toUpperCase());

  const kheadStyle = ev.photo_url
    ? ' style="background-image:linear-gradient(rgba(15,28,26,.30),rgba(15,28,26,.78)),url(' + esc(ev.photo_url) + ');background-size:cover;background-position:center"'
    : '';
  let html =
    '<div class="khead"' + kheadStyle + '>' +
    (ev.photo_url ? '' : '<div class="bloom-wm">' + BLOOM_WM + '</div>') +
    '<button class="khead-edit" id="editBtn" type="button">Edit</button>' +
    '<p class="prep">' + esc(prep) + '</p>' +
    '<h1>' + esc(title) + '</h1>' +
    '<p class="count">' + (n === 0 ? 'No memories yet' : '<b>' + n + '</b> ' + (n === 1 ? 'memory' : 'memories') + ' gathered') + '</p>' +
    '</div>' +

    '<div class="edit-panel" id="editPanel" hidden>' +
    '<span class="label">Photo of them (the card background)</span>' +
    '<input type="file" id="editPhoto" accept="image/*">' +
    (ev.photo_url ? '<button class="remove-photo" id="editRemovePhoto" type="button">Remove current photo</button>' : '') +
    '<span class="label">Name</span>' +
    '<input type="text" id="editName" value="' + esc(ev.honoree || '') + '">' +
    '<span class="label">Title (optional)</span>' +
    '<input type="text" id="editTitle" value="' + esc(ev.title || '') + '">' +
    '<span class="label">Questions guests are asked</span>' +
    '<div id="editPrompts"></div>' +
    '<button class="ep-add" id="editAddPrompt" type="button">\uFF0B Add a question</button>' +
    '<div class="edit-row"><button class="btn" id="editSave" type="button">Save changes</button>' +
    '<button class="edit-cancel" id="editCancel" type="button">Cancel</button></div>' +
    '<p class="error" id="editErr"></p>' +
    '<button class="delete-keepsake" id="deleteBtn" type="button">Delete this keepsake…</button>' +
    '</div>' +

    '<div class="gather"><p class="g-t">Scan or share this to gather more memories:</p>' +
    '<div class="g-share">' +
    '<img class="g-qr" alt="QR code to add a memory" src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=10&data=' + encodeURIComponent(addLink) + '">' +
    '<div class="g-right"><div class="g-row"><div class="g-link">' + esc(addLink) + '</div>' +
    '<button class="g-copy" id="gCopy">Copy</button></div></div>' +
    '</div></div>';

  if (n === 0) {
    html += '<div class="empty"><div class="em"></div><h2>Waiting for the first memory</h2>' +
      '<p>Share the link above — as people add their memories, they’ll appear right here.</p></div>';
  } else {
    html += '<div class="mlist">' + memories.map(function (m) {
      return '<div class="mcard">' +
        '<div class="who"><span class="name">' + esc(m.contributor_name || 'Anonymous') + '</span>' +
        '<span class="when">' + esc(when(m.created_at)) + '</span></div>' +
        (m.prompt_text ? '<div class="q">' + esc(m.prompt_text) + '</div>' : '') +
        '<div class="body">' + esc(m.body) + '</div>' +
        (m.photo_url ? '<div class="photo"><img src="' + esc(m.photo_url) + '" alt="Shared photo" loading="lazy"></div>' : '') +
        '</div>';
    }).join('') + '</div>';
  }

  html += '<button class="refresh" id="refresh">↻ Check for new memories</button>';

  app.innerHTML = html;

  const gCopy = document.getElementById('gCopy');
  gCopy.addEventListener('click', function () {
    navigator.clipboard.writeText(addLink).then(function () {
      gCopy.textContent = 'Copied ✓'; gCopy.classList.add('done');
      setTimeout(function () { gCopy.textContent = 'Copy'; gCopy.classList.remove('done'); }, 2000);
    });
  });
  document.getElementById('refresh').addEventListener('click', function () { start(code); });

  // --- edit keepsake ---
  var panel = document.getElementById('editPanel');
  document.getElementById('editBtn').addEventListener('click', function () {
    panel.hidden = !panel.hidden;
    if (!panel.hidden) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  document.getElementById('editCancel').addEventListener('click', function () { panel.hidden = true; });
  document.getElementById('deleteBtn').addEventListener('click', async function () {
    var name = ev.honoree || ev.title || 'this keepsake';
    if (!window.confirm('Delete the keepsake for ' + name + '?\n\nEvery memory and photo in it will be gone for good. This cannot be undone.')) return;
    if (!window.confirm('Really delete it forever?')) return;
    var btn = this; btn.disabled = true; btn.textContent = 'Deleting…';
    try {
      var res = await fetch(SUPABASE_URL + '/rest/v1/events?id=eq.' + ev.id, { method: 'DELETE', headers: HEADERS });
      if (!res.ok) throw new Error('delete');
      try {
        var list = JSON.parse(localStorage.getItem('nanafy_keepsakes') || '[]');
        localStorage.setItem('nanafy_keepsakes', JSON.stringify(list.filter(function (k) { return (k.code || '').toUpperCase() !== code.toUpperCase(); })));
      } catch (e) {}
      location.href = '/mine/';
    } catch (e) {
      btn.disabled = false; btn.textContent = 'Delete this keepsake…';
      document.getElementById('editErr').textContent = "Couldn't delete. Check your connection and try again.";
    }
  });
  var editPromptList = (ev.prompts || []).slice().sort(function(a,b){ return a.position - b.position; }).map(function(p){ return p.text; });
  function renderEditPrompts(){
    var box = document.getElementById('editPrompts');
    box.innerHTML = editPromptList.map(function(p, i){
      return '<div class="ep-row"><span class="ep-num">' + (i + 1) + '</span>' +
        '<textarea class="ep-input" rows="2" data-i="' + i + '">' + esc(p) + '</textarea>' +
        '<button class="ep-rm" type="button" data-rm="' + i + '" aria-label="Remove question">\u2715</button></div>';
    }).join('');
    Array.prototype.forEach.call(box.querySelectorAll('.ep-input'), function(ta){
      ta.addEventListener('input', function(){ editPromptList[+ta.dataset.i] = ta.value; });
    });
    Array.prototype.forEach.call(box.querySelectorAll('.ep-rm'), function(btn){
      btn.addEventListener('click', function(){ editPromptList.splice(+btn.dataset.rm, 1); renderEditPrompts(); });
    });
  }
  renderEditPrompts();
  document.getElementById('editAddPrompt').addEventListener('click', function(){
    editPromptList.push(''); renderEditPrompts();
  });

  var removePhoto = false;
  var removeBtn = document.getElementById('editRemovePhoto');
  if (removeBtn) removeBtn.addEventListener('click', function () {
    removePhoto = !removePhoto;
    removeBtn.textContent = removePhoto ? 'Photo will be removed — undo' : 'Remove current photo';
    removeBtn.classList.toggle('armed', removePhoto);
  });
  document.getElementById('editSave').addEventListener('click', async function () {
    var btn = this, errEl = document.getElementById('editErr');
    var name = document.getElementById('editName').value.trim();
    if (!name) { errEl.textContent = 'Please keep a name.'; return; }
    btn.disabled = true; btn.textContent = 'Saving…'; errEl.textContent = '';
    try {
      var patch = { honoree: name, title: document.getElementById('editTitle').value.trim() || null };
      if (removePhoto) patch.photo_url = null;
      var file = document.getElementById('editPhoto').files[0];
      if (file) {
        var ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
        var path = 'honoree/' + code.toUpperCase() + '-' + Date.now() + '.' + ext;
        var up = await fetch(SUPABASE_URL + '/storage/v1/object/memory-photos/' + path, {
          method: 'POST',
          headers: Object.assign({}, HEADERS, { 'Content-Type': file.type || 'image/jpeg' }),
          body: file
        });
        if (!up.ok) throw new Error('upload');
        patch.photo_url = SUPABASE_URL + '/storage/v1/object/public/memory-photos/' + path;
      }
      var res = await fetch(SUPABASE_URL + '/rest/v1/events?share_code=eq.' + encodeURIComponent(code.toUpperCase()), {
        method: 'PATCH',
        headers: Object.assign({}, HEADERS, { 'Content-Type': 'application/json', Prefer: 'return=minimal' }),
        body: JSON.stringify(patch)
      });
      if (!res.ok) throw new Error('save');

      // Replace the question list (keep at least one non-empty question).
      var cleaned = editPromptList.map(function(t){ return (t || '').trim(); }).filter(Boolean);
      if (cleaned.length) {
        var del = await fetch(SUPABASE_URL + '/rest/v1/prompts?event_id=eq.' + ev.id, {
          method: 'DELETE', headers: HEADERS
        });
        if (!del.ok) throw new Error('prompts');
        var ins = await fetch(SUPABASE_URL + '/rest/v1/prompts', {
          method: 'POST',
          headers: Object.assign({}, HEADERS, { 'Content-Type': 'application/json', Prefer: 'return=minimal' }),
          body: JSON.stringify(cleaned.map(function(text, i){ return { event_id: ev.id, text: text, position: i }; }))
        });
        if (!ins.ok) throw new Error('prompts');
      }
      start(code);
    } catch (e) {
      btn.disabled = false; btn.textContent = 'Save changes';
      errEl.textContent = "Couldn't save. Check your connection and try again.";
    }
  });
}

async function start(c) {
  code = c;
  app.innerHTML = '<div class="spinner">Gathering the memories…</div>';
  try {
    const ev = await fetchKeepsake(c);
    if (!ev) return renderCodeEntry('No keepsake found with code ' + c.toUpperCase() + '. Double-check it and try again.');
    const u = new URL(location.href);
    u.searchParams.set('c', c.toUpperCase());
    history.replaceState(null, '', u);
    render(ev);
    window.scrollTo(0, 0);
  } catch {
    renderCodeEntry("Couldn't reach the server. Check your connection and try again.");
  }
}

const initial = new URLSearchParams(location.search).get('c');
if (initial && initial.trim().length === 6) start(initial.trim());
else renderCodeEntry();
</script>
<script>
  // Header profile chip: shows your initial when signed in (reads the
  // session Supabase stores locally), otherwise a Sign in link.
  (function(){
    var el = document.getElementById('navProfile'); if (!el) return;
    var email = '';
    try {
      var raw = localStorage.getItem('sb-vigenqlwwoknxjzahvtv-auth-token');
      if (raw) { var s = JSON.parse(raw); email = (s.user && s.user.email) || (s.currentSession && s.currentSession.user && s.currentSession.user.email) || ''; }
    } catch (e) {}
    el.innerHTML = email
      ? '<a class="prof-chip" href="/mine/#account" title="' + email.replace(/"/g,'') + '">' + email[0].toUpperCase() + '</a>'
      : '<a class="prof-link" href="/mine/#account">Sign in</a>';
  })();
</script>
