<style>
  :root {
    --ground: #FBF4EE; --surface: #FFFBF6; --surface-2: #F5E8DE;
    --ink: #2C1D28; --ink-soft: #6A5460; --line: #E7D7CC;
    --plum: #8A3F5C; --turq: #0a786f; --turq-deep: #085d56; --turq-ink: #04302C; --turq-soft: #A9E3DE;
    --shadow: rgba(58, 30, 44, 0.13); --danger: #B23A3A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #1F1620; --surface: #2B1F2C; --surface-2: #362538;
      --ink: #F1E5DC; --ink-soft: #BFA9B2; --line: #3D2E3C;
      --plum: #D68CA7; --turq: #0a786f; --turq-deep: #23a99e; --turq-ink: #eafffb; --turq-soft: #2A5C58;
      --shadow: rgba(0, 0, 0, 0.4); --danger: #F0918C;
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    --serif: "Hoefler Text", "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
    background: var(--ground); color: var(--ink);
    font-family: var(--sans); font-size: 17px; line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 26px 20px 72px; }
  .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 26px; }
  .brand .mark { font-family: var(--serif); font-size: 1.35rem; font-weight: 600; color: var(--ink-soft); letter-spacing: -0.02em; }
  .brand .mark b { color: var(--turq); }
  .topnav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 26px; }
  .topnav .brand { margin-bottom: 0; text-decoration: none; }
  .tn-links { display: flex; gap: 7px; }
  .tn-links a { font-size: 0.85rem; font-weight: 600; color: var(--turq-deep); text-decoration: none; padding: 7px 12px; border: 1px solid var(--turq-soft); border-radius: 999px; white-space: nowrap; }
  .tn-links a:hover { background: var(--turq); color: var(--turq-ink); border-color: var(--turq); }
  @media (max-width: 430px) { .tn-links a { padding: 6px 9px; font-size: 0.78rem; } }

  h1 { font-family: var(--serif); font-weight: 600; font-size: clamp(2rem, 6vw, 2.6rem); line-height: 1.08; margin: 0 0 6px; letter-spacing: -0.01em; }
  .lede { color: var(--ink-soft); font-size: 1rem; margin: 0 0 24px; }

  .create-btn {
    display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
    background: var(--turq); color: var(--turq-ink); border-radius: 999px; padding: 13px 22px;
    font-weight: 700; font-size: 1rem; box-shadow: 0 8px 20px -8px rgba(10,120,111,0.5); margin-bottom: 28px;
  }

  .klist { display: grid; gap: 12px; }
  .kcard {
    display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit;
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px;
    box-shadow: 0 12px 30px -26px var(--shadow); transition: transform 0.12s ease, border-color 0.15s ease;
  }
  .kcard:hover { transform: translateY(-1px); border-color: var(--turq-soft); }
  .kcard .emoji { font-size: 1.7rem; flex: none; }
  .kcard .info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .kcard .name { display: block; font-family: var(--serif); font-size: 1.2rem; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kcard .meta { display: block; font-size: 0.82rem; color: var(--ink-soft); margin-top: 2px; }
  .kcard .arrow { flex: none; color: var(--turq-deep); font-size: 1.2rem; }

  .empty { text-align: center; padding: 20px 10px 10px; }
  .empty .em { font-size: 2.8rem; }
  .empty h2 { font-family: var(--serif); font-weight: 600; font-size: 1.5rem; margin: 10px 0 8px; }
  .empty p { color: var(--ink-soft); margin: 0 auto 22px; max-width: 26em; }

  /* auth card */
  .auth-card { background: var(--surface-2); border-radius: 16px; padding: 18px; margin-top: 26px; }
  .auth-card .auth-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
  .auth-card .auth-sub { color: var(--ink-soft); font-size: 0.9rem; margin: 0 0 14px; line-height: 1.45; }
  .otp-form { display: flex; gap: 8px; flex-wrap: wrap; }
  .otp-form input { flex: 1; min-width: 200px; font: inherit; font-size: 1rem; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); color: var(--ink); outline: none; }
  .otp-form input:focus { border-color: var(--turq); box-shadow: 0 0 0 3px var(--turq-soft); }
  .otp-btn { flex: none; border: 0; border-radius: 12px; padding: 0 20px; background: var(--turq); color: var(--turq-ink); font: inherit; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
  .otp-btn:disabled { opacity: 0.5; cursor: default; }
  .auth-msg { font-size: 0.9rem; color: var(--turq-deep); margin: 12px 0 0; min-height: 1.1em; line-height: 1.4; }
  .auth-msg.err { color: var(--danger); }
  .auth-fine { font-size: 0.78rem; color: var(--ink-soft); margin: 12px 0 0; line-height: 1.45; }
  .auth-alt { border: 0; background: none; color: var(--turq-deep); font: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: underline; margin-top: 10px; padding: 0; }
  .auth-card.signed { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .auth-card.signed .who b { color: var(--ink); }
  .auth-card.signed .who .auth-sub { margin: 3px 0 0; }
  .link-btn { border: 0; background: none; color: var(--turq-deep); font: inherit; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-decoration: underline; flex: none; }

  .note { margin-top: 22px; font-size: 0.82rem; color: var(--ink-soft); line-height: 1.5; text-align: center; }
  .foot { margin-top: 30px; text-align: center; font-size: 12.5px; color: var(--ink-soft); }
  .foot a { color: var(--turq-deep); text-decoration: none; }

  /* == New theme: bold & friendly, white canvas (light only) — overrides == */
  :root{
    color-scheme:light;
    --ground:#ffffff; --surface:#ffffff; --surface-2:#f7f2ec;
    --ink:#14201f; --ink-soft:#5a6a68; --line:#ece6dd;
    --plum:#c14e7c; --turq:#0fb0a4; --turq-deep:#0a7a72; --turq-ink:#ffffff; --turq-soft:#bfeae6;
    --shadow:rgba(20,32,31,.14); --danger:#c0392b;
  }
  body{ --serif:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif; }
  h1,h2,.brand .mark,.code-chip b,.key-sub b,#honoree{ font-weight:900; letter-spacing:-.02em; }
  .submit,.copy-btn,.action.primary,.chip[aria-pressed="true"]{ box-shadow:0 10px 24px -10px rgba(15,176,164,.55); }

  /* == web↔app consistency: turquoise labels + turquoise-wash note (match app) == */
  .label{ color:var(--turq-deep); }
  .note{ background:#e7f7f5; }

  /* --- refinement: Miami-pink "fy", app flower, sharper editorial look --- */
  .brand .mark{ color:#f28ab0; }
  .brand .mark b{ color:#0FB0A4; }
  .btn,.submit,.copy-btn,.action,.nav-cta,.topnav-links a,.tn-links a,.g-copy,.nana,.addown,.suggestion,.chip,.mine-banner,input[type="text"],input[type="email"],.p-input,.code-form input,.link-box{ border-radius:8px !important; }

  /* --- Nike flow: plain header links --- */

  .tn-links a:hover{ background:none !important; color:var(--turq-deep) !important; box-shadow:inset 0 -2px 0 var(--turq); }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL = 'https://vigenqlwwoknxjzahvtv.supabase.co';
  var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpZ2VucWx3d29rbnhqemFodnR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NDI0MjksImV4cCI6MjA5OTIxODQyOX0.qjggNEyEwVfrHP8neWPlTPcKOp92wiFwUgv4aEiswaE';

  var FIELD_COLORS = ['#0B8A80', '#A94069'];
  var BLOOM_WM = '<svg viewBox="0 0 100 100" aria-hidden="true"><g fill="rgba(255,255,255,.13)"><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(0 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(30 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(60 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(90 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(120 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(150 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(180 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(210 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(240 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(270 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(300 50 50)"/><path d="M50 5 C59 15 59 27 50 37 C41 27 41 15 50 5 Z" transform="rotate(330 50 50)"/><circle cx="50" cy="50" r="18.5"/></g></svg>';
  var META = {
    memorial:   { emoji: '', label: 'Memorial' },
    wedding:    { emoji: '', label: 'Wedding' },
    birthday:   { emoji: '', label: 'Birthday' },
    graduation: { emoji: '', label: 'Graduation' },
    tribute:    { emoji: '', label: 'Tribute' },
    other:      { emoji: '', label: 'Keepsake' }
  };
  function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
  function fmtDate(ms){ try { return new Date(ms).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); } catch(e){ return ''; } }

  // ---- device list (Layer 1) ----
  function getDeviceList(){ try { return JSON.parse(localStorage.getItem('nanafy_keepsakes')||'[]'); } catch(e){ return []; } }
  function saveDeviceList(list){ try { localStorage.setItem('nanafy_keepsakes', JSON.stringify(list)); } catch(e){} }
  function mergeInto(list, items){
    items.forEach(function(it){ if(!list.some(function(x){return x.code===it.code;})) list.unshift(it); });
    return list;
  }

  var sb = window.supabase.createClient(SUPABASE_URL, ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });

  function renderList(){
    var list = getDeviceList().slice().sort(function(a,b){ return (b.created||0)-(a.created||0); });
    var el = document.getElementById('list');
    if (!list.length) {
      el.innerHTML =
        '<div class="empty">' +
        '<h2>No keepsakes yet</h2>' +
        '<p>Keepsakes you create show up here. Sign in below to keep them safe and reach them from any device.</p>' +
        '<a class="create-btn" href="/create/">＋ Create a keepsake</a></div>';
      return;
    }
    el.innerHTML =
      '<h1>My keepsakes</h1>' +
      '<p class="lede">' + list.length + ' keepsake' + (list.length>1?'s':'') + '.</p>' +
      '<a class="create-btn" href="/create/">＋ Create a keepsake</a>' +
      '<div class="klist">' + list.map(function (k, i) {
        var m = META[k.type] || META.other;
        var tile = FIELD_COLORS[i % FIELD_COLORS.length];
        return '<a class="kcard" data-code="' + esc(k.code) + '" href="/keepsake/?c=' + encodeURIComponent(k.code) + '" style="background:' + tile + '">' +
          '<span class="bloom-wm">' + BLOOM_WM + '</span>' +
          '<span class="kname">' + esc(k.name || 'Keepsake') + '</span>' +
          '<span class="kmeta">' + esc(m.label) + ' · ' + esc(fmtDate(k.created)) + ' · code ' + esc(k.code) + '</span></a>';
      }).join('') + '</div>';
    loadTilePhotos(list.map(function(k){ return k.code; }));
  }

  // Honoree photos as tile backgrounds, when set.
  function loadTilePhotos(codes){
    if (!codes.length) return;
    sb.from('events').select('share_code,photo_url').in('share_code', codes)
      .then(function(res){
        (res.data || []).forEach(function(row){
          if (!row.photo_url) return;
          var el = document.querySelector('.kcard[data-code="' + row.share_code + '"]');
          if (el) el.style.background =
            'linear-gradient(rgba(15,28,26,.25),rgba(15,28,26,.72)), url(' + row.photo_url + ') center/cover';
        });
      });
  }

  function renderAuth(session){
    var el = document.getElementById('authArea');
    if (session && session.user) {
      el.innerHTML =
        '<div class="auth-card signed"><div class="who">✓ Signed in as <b>' + esc(session.user.email) + '</b>' +
        '<div class="auth-sub">Your keepsakes are saved to your account and follow you to any device.</div></div>' +
        '<button class="link-btn" id="signOut">Sign out</button></div>';
      document.getElementById('signOut').addEventListener('click', function(){
        sb.auth.signOut().then(function(){ location.reload(); });
      });
    } else {
      var savedEmail = '';
      try { savedEmail = localStorage.getItem('nanafy_signin_email') || ''; } catch (e) {}
      var returning = !!savedEmail;
      el.innerHTML =
        '<div class="auth-card">' +
        '<div class="auth-title">' + (returning ? 'Welcome back' : 'Sign in') + '</div>' +
        '<p class="auth-sub">' + (returning
          ? 'Sign back in to reach your keepsakes on any device. No password — we’ll send a one-tap link.'
          : 'Enter your email and we’ll send a one-tap sign-in link — no password. Your keepsakes then follow you to any phone or computer.') + '</p>' +
        '<form class="otp-form" id="otpForm">' +
        '<input type="email" id="otpEmail" placeholder="you@example.com" autocomplete="email" value="' + esc(savedEmail) + '" required>' +
        '<button class="otp-btn" type="submit">' + (returning ? 'Send my sign-in link' : 'Send sign-in link') + '</button></form>' +
        (returning ? '<button type="button" class="auth-alt" id="useOther">Use a different email</button>' : '') +
        '<p class="auth-msg" id="authMsg"></p>' +
        '<p class="auth-fine">You stay signed in on this device — you’ll only need to do this again if you sign out or use a new device.</p>' +
        '</div>';
      var useOther = document.getElementById('useOther');
      if (useOther) useOther.addEventListener('click', function () {
        try { localStorage.removeItem('nanafy_signin_email'); } catch (e) {}
        var inp = document.getElementById('otpEmail'); inp.value = ''; inp.focus();
      });
      document.getElementById('otpForm').addEventListener('submit', function(e){
        e.preventDefault();
        var email = document.getElementById('otpEmail').value.trim();
        var btn = e.target.querySelector('.otp-btn');
        var msg = document.getElementById('authMsg');
        msg.className = 'auth-msg'; msg.textContent = '';
        if (!email || email.indexOf('@') < 1) { msg.className='auth-msg err'; msg.textContent='Please enter a valid email.'; return; }
        try { localStorage.setItem('nanafy_signin_email', email); } catch (e) {}
        btn.disabled = true; btn.textContent = 'Sending…';
        sb.auth.signInWithOtp({ email: email, options: { emailRedirectTo: location.origin + '/mine/' } })
          .then(function(res){
            if (res.error) throw res.error;
            msg.textContent = '✓ Check your email (' + email + ') — including your spam folder — for a link from Nanafy. Tap it to sign in.';
            btn.textContent = 'Link sent';
          })
          .catch(function(err){
            msg.className='auth-msg err';
            msg.textContent = 'Couldn’t send the link: ' + (err.message || 'please try again in a minute.');
            btn.disabled = false; btn.textContent = 'Email me a link';
          });
      });
    }
  }

  // ---- sync device keepsakes to the account + pull the account's keepsakes ----
  async function syncAndLoad(session){
    var uid = session.user.id;
    try {
      var device = getDeviceList();
      var codes = device.map(function(k){ return (k.code||'').toUpperCase(); }).filter(Boolean);

      // Resolve device codes -> event ids, then record account membership.
      if (codes.length) {
        var evByCode = await sb.from('events').select('id,share_code').in('share_code', codes);
        var rows = evByCode.data || [];
        if (rows.length) {
          await sb.from('event_members').upsert(
            rows.map(function(r){ return { user_id: uid, event_id: r.id }; }),
            { onConflict: 'user_id,event_id' }
          );
        }
      }

      // Pull every keepsake tied to this account (from any device).
      var mem = await sb.from('event_members').select('event_id').eq('user_id', uid);
      var ids = (mem.data || []).map(function(m){ return m.event_id; });
      if (ids.length) {
        var evs = await sb.from('events').select('share_code,honoree,title,event_type,created_at').in('id', ids);
        var accountItems = (evs.data || []).map(function(e){
          return { code: e.share_code, name: e.honoree || e.title || 'Keepsake', type: e.event_type, created: Date.parse(e.created_at) };
        });
        saveDeviceList(mergeInto(getDeviceList(), accountItems));
        renderList();
      }
    } catch (e) { /* keep showing device list on any error */ }
  }

  // ---- boot ----
  renderList();
  sb.auth.getSession().then(function(res){
    var session = res.data.session;
    renderAuth(session);
    if (session) syncAndLoad(session);
  });
  sb.auth.onAuthStateChange(function(event, session){
    renderAuth(session);
    if (event === 'SIGNED_IN' && session) syncAndLoad(session);
  });
</script>
</body>
